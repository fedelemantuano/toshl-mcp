name: CI - Build and Test

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  REGISTRY: ghcr.io

jobs:
  # Validate PR has exactly one release label
  validate-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Check release labels
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch labels from GitHub API to ensure we get the latest
          PR_LABELS=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.labels[].name' | tr '\n' ' ')
          echo "PR Labels: $PR_LABELS"

          # Count release labels
          MAJOR_COUNT=$(echo "$PR_LABELS" | grep -c "major_release" || true)
          MINOR_COUNT=$(echo "$PR_LABELS" | grep -c "minor_release" || true)
          PATCH_COUNT=$(echo "$PR_LABELS" | grep -c "patch_release" || true)

          TOTAL_RELEASE_LABELS=$((MAJOR_COUNT + MINOR_COUNT + PATCH_COUNT))

          echo "Found $TOTAL_RELEASE_LABELS release label(s)"

          if [ "$TOTAL_RELEASE_LABELS" -eq 0 ]; then
            echo "::error::No release label found. Please add exactly one of: major_release, minor_release, or patch_release"
            exit 1
          elif [ "$TOTAL_RELEASE_LABELS" -gt 1 ]; then
            echo "::error::Multiple release labels found. Please use exactly one of: major_release, minor_release, or patch_release"
            exit 1
          fi

          echo "✅ Valid release label found"

  # Lint and format check
  lint:
    runs-on: ubuntu-latest
    needs: validate-labels
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          uv sync --all-extras
          echo "VIRTUAL_ENV=.venv" >> $GITHUB_ENV
          echo "PATH=${{ github.workspace }}/.venv/bin:${PATH}" >> $GITHUB_ENV

      - name: Run pre-commit
        run: make pre-commit

  # Build and test the Python application
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          uv sync --all-extras
          echo "VIRTUAL_ENV=.venv" >> $GITHUB_ENV
          echo "PATH=${{ github.workspace }}/.venv/bin:${PATH}" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: make test-cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 7

  # Build Python package
  build-package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package
          path: dist/
          retention-days: 7
